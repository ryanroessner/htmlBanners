<script type='text/javascript'>

function startAd() {
	addEventListeners();
	initAnimation();
};

function initAnimation(){
var bannerTimeline = gsap.timeline();
var containerScale = .96;
// bannerTimeline.timeScale(6.5);

//frame1
bannerTimeline.from(".img-1",{duration:6, y:10, scale:1.5, ease:"none",transformOrigin:"50% 50%"},0);
bannerTimeline.to(".photoslideshow",{duration:1,height:'156px', scale:1, ease:"power2.inOut",transformOrigin:"50% 50%"},1);
bannerTimeline.to(".logo",{duration:1,y:-38,x:0, scale:1, ease: "power2.inOut", transformOrigin:"50% 50%"},1);

//frame2
bannerTimeline.to(".photoslideshow",{duration:.5, scale:containerScale, ease:"sine.inOut",transformOrigin:"50% 50%"},2);
bannerTimeline.to(".photoslideshow",{duration:.5, scale:1, ease:"sine.inOut",transformOrigin:"50% 50%"},2.5);
bannerTimeline.to(".image-holder-2",{duration:.5,alpha:1,  ease: "none"},2.2);
bannerTimeline.to(".img-2",{duration:5,x:-5, y:-20,scale:1.2, ease: "none",transformOrigin:"50% 50%"},2);

//frame3
bannerTimeline.to(".photoslideshow",{duration:.5, scale:containerScale, ease:"sine.inOut",transformOrigin:"50% 50%"},5);
bannerTimeline.to(".photoslideshow",{duration:.5, scale:1, ease:"sine.inOut",transformOrigin:"50% 50%"},5.5);
bannerTimeline.to(".image-holder-3",{duration:.5,alpha:1,  ease: "none"},5.2);
bannerTimeline.from(".img-3",{duration:5,x:30, scale:1.2, ease: "none",transformOrigin:"50% 50%"},5);

//frame4
bannerTimeline.to(".photoslideshow",{duration:.5, scale:containerScale, ease:"sine.inOut",transformOrigin:"50% 50%"},8);
bannerTimeline.to(".photoslideshow",{duration:.5, scale:1, ease:"sine.inOut",transformOrigin:"50% 50%"},8.5);
bannerTimeline.to(".image-holder-4",{duration:.5,alpha:1,  ease: "none"},8.2);
bannerTimeline.from(".img-4",{duration:5,x:-20, y:-50,scale:1.2, ease: "none",transformOrigin:"50% 50%"},8);

//frame5
bannerTimeline.to(".photoslideshow",{duration:.5, scale:containerScale, ease:"sine.inOut",transformOrigin:"50% 50%"},11);
bannerTimeline.to(".photoslideshow",{duration:.5, scale:1, ease:"sine.inOut",transformOrigin:"50% 50%"},11.5);
bannerTimeline.to(".image-holder-5",{duration:.5,alpha:1,  ease: "none"},11.2);
bannerTimeline.from(".img-5",{duration:5,x:30, y:-20, scale:1.2, ease:  "power2.out",transformOrigin:"50% 50%"},11);
}

function addEventListeners(){
	document.getElementById('banner').addEventListener('click', clickthrough);
	document.getElementById('banner').addEventListener('mouseover', bannerOver);
	document.getElementById('banner').addEventListener('mouseout', bannerOut);
}

function clickthrough(){
	window.open(window.clickTAG);
}
function bannerOver(){
	gsap.to("#cta-arrows",{ duration:.5,scale:1.6,transformOrigin:"center center", ease:"expo.out"});
	gsap.to("#cta-arrows>path",{ duration:.5, scale:.8,transformOrigin:"center center", ease:"expo.out"});
}
function bannerOut(){
	gsap.to("#cta-arrows",{ duration:.5, scale:1,transformOrigin:"center center", ease:"expo.out"});
	gsap.to("#cta-arrows>path",{ duration:.5, scale:1,transformOrigin:"center center", ease:"expo.out"});
}
window.onload = function () {
	gsap.set('#ad',{duration:0,alpha:1});
	startAd();
};

</script>
